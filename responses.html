<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Responses & Compatibility Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f12;
      --card: #1a1a1f;
      --text: #f5f0eb;
      --muted: rgba(245, 240, 235, 0.55);
      --gold: #c9a962;
      --rose: #b85c6f;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem 1.25rem;
      line-height: 1.5;
      max-width: 560px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 0.5rem; }
    .note {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .note strong { color: var(--gold); font-weight: 500; }
    .note code {
      background: var(--card);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.85em;
    }
    .score-hero {
      background: linear-gradient(135deg, rgba(201, 169, 98, 0.15), rgba(184, 92, 111, 0.1));
      border: 1px solid rgba(201, 169, 98, 0.35);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .score-hero--empty {
      border-color: rgba(255,255,255,0.1);
      background: var(--card);
    }
    .score-hero__label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }
    .score-hero__percent {
      font-size: 3.5rem;
      font-weight: 600;
      line-height: 1;
      color: var(--text);
    }
    .score-hero__detail {
      margin-top: 0.5rem;
      font-size: 0.95rem;
      color: var(--muted);
    }
    .score-hero__path {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.35rem 0.85rem;
      border-radius: 100px;
      font-size: 0.8rem;
      background: rgba(184, 92, 111, 0.2);
      color: var(--rose);
    }
    .score-hero__path--pass {
      background: rgba(201, 169, 98, 0.2);
      color: var(--gold);
    }
    .empty {
      color: var(--muted);
      padding: 2rem;
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
      text-align: center;
      margin-bottom: 1rem;
    }
    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 1rem;
      color: var(--gold);
      margin-bottom: 0.75rem;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      font-size: 0.9rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .row:last-child { border-bottom: none; }
    .label { color: var(--muted); }
    .value { text-align: right; }
    .value--name { color: var(--rose); font-weight: 500; }
    .badge-yes {
      display: inline-block;
      background: rgba(184, 92, 111, 0.2);
      color: var(--rose);
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      font-size: 0.8rem;
    }
    .actions { margin-top: 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
    button {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }
    button:hover { border-color: var(--gold); }
    button.danger:hover { border-color: var(--rose); }
    a { color: var(--gold); }
  </style>
</head>
<body>
  <h1>Responses & compatibility</h1>
  <p class="note">
    <strong>For you only</strong> — she never sees this page or her score.<br>
    Open <code>responses.html</code> in the <strong>same browser</strong> you used to test
    (or add <code>?admin=1</code> to the main page for a quick link).<br><br>
    <a href="index.html">← Back to proposal</a>
    ·
    <a href="index.html?admin=1">Main page (admin link)</a>
  </p>

  <div id="score-hero"></div>
  <div id="responses-list"></div>

  <div class="actions">
    <button type="button" id="btn-refresh">Refresh</button>
    <button type="button" id="btn-export">Export JSON</button>
    <button type="button" id="btn-clear" class="danger">Clear all</button>
  </div>

  <script src="js/storage.js"></script>
  <script>
    const listEl = document.getElementById('responses-list');
    const heroEl = document.getElementById('score-hero');

    function formatDate(iso) {
      if (!iso) return '—';
      try {
        return new Date(iso).toLocaleString();
      } catch {
        return iso;
      }
    }

    function hasScore(entry) {
      return typeof entry.compatibilityPercent === 'number';
    }

    function renderScoreHero(latest) {
      if (!latest) {
        heroEl.innerHTML = `
          <div class="score-hero score-hero--empty">
            <div class="score-hero__label">Compatibility score</div>
            <p class="score-hero__detail">No score yet. Finish all 9 questions on the main page, then refresh here.</p>
          </div>`;
        return;
      }

      if (!hasScore(latest)) {
        heroEl.innerHTML = `
          <div class="score-hero score-hero--empty">
            <div class="score-hero__label">Compatibility score</div>
            <p class="score-hero__detail">Questionnaire not finished yet (need all 9 answers). Last update: ${formatDate(latest.updatedAt)}</p>
          </div>`;
        return;
      }

      const pts = latest.compatibilityScore != null ? latest.compatibilityScore : '?';
      const passed = latest.compatibilityPassed === true;
      const path = passed
        ? 'Continued to confession (60% or higher)'
        : 'Soft ending (below 60%)';

      heroEl.innerHTML = `
        <div class="score-hero">
          <div class="score-hero__label">Latest compatibility</div>
          <div class="score-hero__percent">${latest.compatibilityPercent}%</div>
          <div class="score-hero__detail">${pts} / 18 points · threshold 60% (11 pts)</div>
          <span class="score-hero__path ${passed ? 'score-hero__path--pass' : ''}">${path}</span>
        </div>`;
    }

    function render() {
      const entries = window.ProposalStorage.loadAll();
      const latest = entries.length ? entries[entries.length - 1] : null;

      renderScoreHero(latest);

      if (!entries.length) {
        listEl.innerHTML = '<div class="empty">No saved data yet. Complete the questionnaire on index.html first.</div>';
        return;
      }

      listEl.innerHTML = entries
        .slice()
        .reverse()
        .map((e, i) => {
          const scoreLine = hasScore(e)
            ? `<div class="row"><span class="label">Compatibility</span><span class="value"><strong>${e.compatibilityPercent}%</strong> (${e.compatibilityScore}/18)${e.compatibilityPassed ? ' · passed' : ' · soft ending'}</span></div>`
            : '<div class="row"><span class="label">Compatibility</span><span class="value">Not finished</span></div>';

          return `
          <article class="card">
            <h2>Session ${entries.length - i}${e.saidYes ? ' <span class="badge-yes">Said Yes ❤️</span>' : ''}</h2>
            ${scoreLine}
            <div class="row">
              <span class="label">Favorite dance partner</span>
              <span class="value value--name">${escapeHtml(e.favoritePartner || '—')}</span>
            </div>
            ${renderQuestionnaire(e.questionnaireAnswers)}
            <div class="row"><span class="label">Random affection</span><span class="value">${bool(e.randomAffection)}</span></div>
            <div class="row"><span class="label">Excessive compliments</span><span class="value">${bool(e.excessiveCompliments)}</span></div>
            <div class="row"><span class="label">Future memories</span><span class="value">${bool(e.futureMemories)}</span></div>
            <div class="row"><span class="label">Dramatic behavior</span><span class="value">${bool(e.dramaticBehavior)}</span></div>
            <div class="row"><span class="label">Already obsessed ack.</span><span class="value">${bool(e.alreadyObsessed)}</span></div>
            <div class="row"><span class="label">Terms accepted</span><span class="value">${bool(e.termsAccepted)}</span></div>
            <div class="row"><span class="label">Last updated</span><span class="value">${formatDate(e.updatedAt)}</span></div>
          </article>`;
        })
        .join('');
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function bool(v) {
      return v ? '✓ Yes' : '✗ No';
    }

    function renderQuestionnaire(answers) {
      if (!answers || !Object.keys(answers).length) return '';
      const items = Object.keys(answers)
        .sort((a, b) => Number(a) - Number(b))
        .map((key) => {
          const item = answers[key];
          const pts = item.score != null ? ` (${item.score}pt)` : '';
          return `<div class="row"><span class="label">Q${Number(key) + 1}</span><span class="value">${escapeHtml(item.answer || '—')}${pts}</span></div>`;
        })
        .join('');
      return `<div style="margin:0.75rem 0;padding-top:0.75rem;border-top:1px solid rgba(255,255,255,0.08)"><strong style="font-size:0.8rem;color:var(--gold)">Each answer</strong>${items}</div>`;
    }

    document.getElementById('btn-refresh').addEventListener('click', render);

    document.getElementById('btn-export').addEventListener('click', () => {
      const data = JSON.stringify(window.ProposalStorage.loadAll(), null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `proposal-responses-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(a.href);
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      if (confirm('Delete all saved responses on this browser?')) {
        localStorage.removeItem(window.ProposalStorage.STORAGE_KEY);
        render();
      }
    });

    render();
  </script>
</body>
</html>
